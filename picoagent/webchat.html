<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picoagent Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex;
         flex-direction: column; }

  /* Login screen */
  #login { display: flex; align-items: center; justify-content: center; height: 100vh; }
  #login-box { background: #1a1a1a; padding: 2rem; border-radius: 12px;
               width: 320px; text-align: center; }
  #login-box h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  #login-box p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
  #login-box input { width: 100%; padding: 0.7rem; border: 1px solid #333;
                     border-radius: 8px; background: #111; color: #e0e0e0;
                     font-size: 1rem; margin-bottom: 0.8rem; }
  #login-box input:focus { outline: none; border-color: #4a9eff; }
  #login-box button { width: 100%; padding: 0.7rem; border: none; border-radius: 8px;
                      background: #4a9eff; color: #fff; font-size: 1rem;
                      cursor: pointer; }
  #login-box button:hover { background: #3a8eef; }
  #login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem;
                 min-height: 1.2rem; }

  /* Chat screen */
  #chat { display: none; flex-direction: column; height: 100vh; }
  #header { display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1rem; background: #1a1a1a; border-bottom: 1px solid #222; }
  #header h2 { font-size: 1rem; }
  #header button { background: none; border: 1px solid #444; border-radius: 6px;
                   color: #aaa; padding: 0.3rem 0.8rem; cursor: pointer;
                   font-size: 0.8rem; }
  #header button:hover { border-color: #888; color: #ddd; }

  #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex;
              flex-direction: column; gap: 0.6rem; }
  .msg { max-width: 80%; padding: 0.7rem 1rem; border-radius: 12px;
         line-height: 1.5; font-size: 0.95rem; word-wrap: break-word;
         white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #2a5a9e; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #2a2a2a;
                   border-bottom-left-radius: 4px; }
  .msg code { background: #111; padding: 0.15rem 0.35rem; border-radius: 4px;
              font-size: 0.85em; }
  .msg pre { background: #111; padding: 0.6rem; border-radius: 6px; margin: 0.4rem 0;
             overflow-x: auto; }
  .msg pre code { background: none; padding: 0; }

  #input-area { display: flex; gap: 0.5rem; padding: 0.8rem 1rem;
                background: #1a1a1a; border-top: 1px solid #222; }
  #input-area textarea { flex: 1; padding: 0.7rem; border: 1px solid #333;
                         border-radius: 8px; background: #111; color: #e0e0e0;
                         font-size: 1rem; font-family: inherit; resize: none;
                         min-height: 44px; max-height: 120px; }
  #input-area textarea:focus { outline: none; border-color: #4a9eff; }
  #input-area button { padding: 0 1.2rem; border: none; border-radius: 8px;
                       background: #4a9eff; color: #fff; font-size: 1rem;
                       cursor: pointer; }
  #input-area button:hover { background: #3a8eef; }
  #input-area button:disabled { background: #333; cursor: not-allowed; }

  .typing { align-self: flex-start; color: #888; font-style: italic;
            font-size: 0.85rem; padding: 0.5rem 1rem; }

  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    #login-box { width: 90%; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login">
  <div id="login-box">
    <h1>Picoagent</h1>
    <p>Enter password to start chatting</p>
    <input type="password" id="password" placeholder="Password" autofocus>
    <button onclick="doLogin()">Log In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat">
  <div id="header">
    <h2>Picoagent</h2>
    <button onclick="doLogout()">Log out</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const $login = document.getElementById('login');
const $chat = document.getElementById('chat');
const $messages = document.getElementById('messages');
const $input = document.getElementById('msg-input');
const $sendBtn = document.getElementById('send-btn');
const $password = document.getElementById('password');
const $loginError = document.getElementById('login-error');

// Auto-resize textarea
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Enter to login
$password.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  $loginError.textContent = '';
  const pw = $password.value;
  if (!pw) return;

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw }),
  });

  if (res.ok) {
    $login.style.display = 'none';
    $chat.style.display = 'flex';
    $password.value = '';
    await loadHistory();
    $input.focus();
  } else {
    $loginError.textContent = 'Wrong password';
  }
}

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    if (!res.ok) return;
    const data = await res.json();
    $messages.innerHTML = '';
    for (const m of data.messages) {
      appendMessage(m.role, m.content);
    }
    scrollToBottom();
  } catch (e) {
    // Ignore — fresh session
  }
}

function renderContent(text) {
  // Escape HTML
  let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Code blocks: ```...```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code: `...`
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  return s;
}

function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = renderContent(content);
  $messages.appendChild(div);
}

function scrollToBottom() {
  $messages.scrollTop = $messages.scrollHeight;
}

async function sendMessage() {
  const text = $input.value.trim();
  if (!text) return;

  $input.value = '';
  $input.style.height = 'auto';
  $sendBtn.disabled = true;

  appendMessage('user', text);
  scrollToBottom();

  // Show typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Thinking...';
  $messages.appendChild(typing);
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    typing.remove();

    if (res.status === 401) {
      // Session expired — back to login
      $chat.style.display = 'none';
      $login.style.display = 'flex';
      $loginError.textContent = 'Session expired. Please log in again.';
      return;
    }

    const data = await res.json();
    appendMessage('assistant', data.reply || data.error || 'No response');
  } catch (e) {
    typing.remove();
    appendMessage('assistant', '[Connection error]');
  }

  scrollToBottom();
  $sendBtn.disabled = false;
  $input.focus();
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  $chat.style.display = 'none';
  $login.style.display = 'flex';
  $messages.innerHTML = '';
  $password.focus();
}

// Check if already logged in (cookie still valid)
(async () => {
  try {
    const res = await fetch('/api/history');
    if (res.ok) {
      $login.style.display = 'none';
      $chat.style.display = 'flex';
      await loadHistory();
      $input.focus();
    }
  } catch (e) {
    // Not logged in
  }
})();
</script>
</body>
</html>
