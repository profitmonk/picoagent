services:
  picoagent:
    build: .
    container_name: picoagent
    restart: unless-stopped

    # Config (read-only) + persistent memory volume
    volumes:
      - ./config.yaml:/home/agent/app/config.yaml:ro
      - picoagent-data:/data
    env_file:
      - .env
    environment:
      - PICOAGENT_CONFIG=/home/agent/app/config.yaml

    # Webhook ports: Telegram (8443) + WhatsApp (8080)
    ports:
      - "8443:8443"
      - "8080:8080"

    # Security constraints
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    mem_limit: 512m
    memswap_limit: 512m
    tmpfs:
      - /tmp:size=64m

    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import picoagent; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  picoagent-data:
